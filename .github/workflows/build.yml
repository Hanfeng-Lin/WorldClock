name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: .\build.ps1 -NoShortcut

      - name: Package
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'dev' }
          $name = "WorldClock-$version"
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          Copy-Item WorldClock.exe,clock.ico,cities.txt,README.md,LICENSE,CHANGELOG.md -Destination $name
          Compress-Archive -Path $name -DestinationPath "$name.zip" -Force
          "ARTIFACT=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldClock
          path: ${{ env.ARTIFACT }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
